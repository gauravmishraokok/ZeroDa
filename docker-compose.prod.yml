services:
  mysql:
    image: mysql:8.0
    container_name: zeroda_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: zeroda
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    image: gsrthegreat/expense-tracker-backend:latest
    container_name: zeroda_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=zeroda
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: gsrthegreat/expense-tracker-frontend:latest
    container_name: zeroda_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data: